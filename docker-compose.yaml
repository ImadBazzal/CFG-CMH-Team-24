services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (Express) ───────────────────────────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT:         5001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DATABASE_SSL: "false"
      CORS_ORIGIN:  "http://localhost:3000"
    ports:
      - "${BACKEND_HOST_PORT:-5050}:5001"
    depends_on:
      db:
        condition: service_healthy

  # ── Seed (runs once, then exits) ────────────────────────────────────────────
  seed:
    build: ./backend
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DATABASE_SSL: "false"
    command: ["node", "dist/scripts/seed_database.js"]
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build: ./code
    restart: unless-stopped
    environment:
      # Server-side routes proxy to backend via the Docker network
      NEXT_PUBLIC_BACKEND_URL: http://backend:5001
      # Google Maps (optional — map features won't work without this key)
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
